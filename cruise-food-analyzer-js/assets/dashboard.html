<!doctype html><html><head><meta charset="utf-8"><title>Cruise Food Dashboard</title><style>body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:16px;background:#fafafa;color:#222}.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 5px #0002}h1{font-size:20px;margin:0 0 10px}h2{font-size:16px;margin:0 0 8px}.metric{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:6px 0}.small{color:#666;font-size:13px}.meal{padding:8px 0;border-top:1px solid #eee}</style></head><body><h1>Cruise Food Dashboard</h1><div id="app" class="card">Loading...</div><script>
const K='cruise_food_analyzer_data_v1';
function get(){try{return JSON.parse(localStorage.getItem(K))||{profile:null,meals:[]}}catch(e){return{profile:null,meals:[]}}}
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function mid(m,a,b){return((Number(m[a])||0)+(Number(m[b])||0))/2}
function cat(s){return s<30?'Low':s<50?'Lower-moderate':s<70?'Good':'Very high'}
function render(){let days=parseInt(new URLSearchParams(location.search).get('days'))||7,s=get(),c=new Date();c.setDate(c.getDate()-days+1);let ci=iso(c),ms=s.meals.filter(m=>m.date>=ci).sort((a,b)=>(b.date+b.timestamp).localeCompare(a.date+a.timestamp));let t=ms.reduce((a,m)=>{a.cal+=mid(m,'calories_min','calories_max');a.pro+=mid(m,'protein_min','protein_max');a.car+=mid(m,'carbs_min','carbs_max');a.fat+=mid(m,'fat_min','fat_max');a.fib+=mid(m,'fiber_min','fiber_max');a.sat+=Number(m.satiety_score)||0;return a},{cal:0,pro:0,car:0,fat:0,fib:0,sat:0});let avg=ms.length?Math.round(t.sat/ms.length):0;let html=`<h2>Last ${days} days</h2><div class="metric"><span>Meals logged</span><strong>${ms.length}</strong></div><div class="metric"><span>Avg satiety</span><strong>${ms.length?avg+'/100 ('+cat(avg)+')':'n/a'}</strong></div><div class="metric"><span>Calories</span><strong>${Math.round(t.cal)}</strong></div><div class="metric"><span>Protein</span><strong>${Math.round(t.pro)} g</strong></div><div class="metric"><span>Carbs</span><strong>${Math.round(t.car)} g</strong></div><div class="metric"><span>Fat</span><strong>${Math.round(t.fat)} g</strong></div><div class="metric"><span>Fiber</span><strong>${Math.round(t.fib)} g</strong></div><h2 style="margin-top:16px">Meals</h2>`;html+=ms.length?ms.map(m=>`<div class="meal"><strong>${m.date}: ${m.meal_name}</strong><br><span class="small">${m.foods||''}</span><br><span class="small">${m.calories_min}-${m.calories_max} kcal, protein ${m.protein_min}-${m.protein_max} g, satiety ${m.satiety_score}/100, glycemic ${m.glycemic}</span></div>`).join(''):'<p class="small">No meals logged yet.</p>';document.getElementById('app').innerHTML=html}render();
</script></body></html>
