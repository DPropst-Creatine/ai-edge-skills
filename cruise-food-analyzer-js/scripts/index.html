<!doctype html><html><head><meta charset="utf-8"><title>Cruise Food Analyzer</title></head><body><script>
const K='cruise_food_analyzer_data_v1';
function iso(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function date(x){let n=new Date();if(!x||String(x).toLowerCase()==='today')return iso(n);if(String(x).toLowerCase()==='yesterday'){n.setDate(n.getDate()-1);return iso(n)}let p=new Date(x);return isNaN(p)?iso(n):iso(p)}
function get(){try{return JSON.parse(localStorage.getItem(K))||{profile:null,meals:[]}}catch(e){return{profile:null,meals:[]}}}
function put(s){localStorage.setItem(K,JSON.stringify(s))}
function kg(lb){return Number(lb)*0.45359237} function cm(i){return Number(i)*2.54} function r(v,n){return Math.round(v/n)*n}
function cat(s){s=Number(s);return s<30?'Low':s<50?'Lower-moderate':s<70?'Good':'Very high'}
function targets(p){if(!p||!p.age||!p.height_in||!p.weight_lb||!p.sex)return null;let w=kg(p.weight_lb),h=cm(p.height_in),a=Number(p.age),rmr;if(p.sex==='male')rmr=10*w+6.25*h-5*a+5;else if(p.sex==='female')rmr=10*w+6.25*h-5*a-161;else rmr=((10*w+6.25*h-5*a+5)+(10*w+6.25*h-5*a-161))/2;let f={sedentary:1.2,light:1.375,moderate:1.55,very_active:1.725,athlete:1.9}[p.activity]||1.375;let t=rmr*f,g=p.goal||'maintenance',lo=t-100,hi=t+100,sat='45-60';if(g==='fat_loss'||g==='hunger_control'){lo=t-500;hi=t-250;sat='55-70'}else if(g==='vacation_damage_control'){lo=t-250;hi=t+100;sat='45-60'}else if(g==='muscle_gain'){lo=t+150;hi=t+300;sat='35-55'}else if(g==='performance'){lo=t;hi=t+300;sat='35-55'}else if(g==='glucose_control'){lo=t-250;hi=t+100;sat='50-70'}let pw=p.target_weight_lb||p.weight_lb,pk=kg(pw),pmin=pk*1.2,pmax=pk*1.6;if(['fat_loss','hunger_control','muscle_gain','performance','vacation_damage_control'].includes(g)){pmin=pk*1.6;pmax=pk*2.2}return{goal:g,rmr:r(rmr,10),tdee:r(t,50),calorie_target_min:Math.max(1200,r(lo,50)),calorie_target_max:Math.max(1300,r(hi,50)),protein_target_min:Math.round(pmin),protein_target_max:Math.round(pmax),satiety_daily_target:sat,confidence:p.age&&p.sex&&p.height_in&&p.weight_lb&&p.activity?'Moderate':'Low'}}
function mid(m,a,b){return((Number(m[a])||0)+(Number(m[b])||0))/2}
function sum(s,d){let ms=s.meals.filter(m=>m.date===d),tot=ms.reduce((a,m)=>{a.cal+=mid(m,'calories_min','calories_max');a.pro+=mid(m,'protein_min','protein_max');a.car+=mid(m,'carbs_min','carbs_max');a.fat+=mid(m,'fat_min','fat_max');a.fib+=mid(m,'fiber_min','fiber_max');a.sat+=Number(m.satiety_score)||0;return a},{cal:0,pro:0,car:0,fat:0,fib:0,sat:0});let avg=ms.length?Math.round(tot.sat/ms.length):null,t=targets(s.profile),rem=t?{calories_to_min:Math.round(t.calorie_target_min-tot.cal),calories_to_max:Math.round(t.calorie_target_max-tot.cal),protein_to_min:Math.round(t.protein_target_min-tot.pro),protein_to_max:Math.round(t.protein_target_max-tot.pro)}:null;return{date:d,meal_count:ms.length,totals:{calories:Math.round(tot.cal),protein:Math.round(tot.pro),carbs:Math.round(tot.car),fat:Math.round(tot.fat),fiber:Math.round(tot.fib),average_satiety_score:avg},targets:t,remaining:rem,meals:ms}}
function fmtT(t){return t?`Goal: ${t.goal}\nRMR: ~${t.rmr} kcal/day\nTDEE: ~${t.tdee} kcal/day\nDaily calorie target: ${t.calorie_target_min}-${t.calorie_target_max} kcal\nProtein target: ${t.protein_target_min}-${t.protein_target_max} g/day\nHava-style daily satiety target: ${t.satiety_daily_target}\nConfidence: ${t.confidence}`:'No complete profile is saved yet.'}
function fmtS(x){let a=[`Daily summary for ${x.date}:`,`Meals logged: ${x.meal_count}`,`Estimated totals: ${x.totals.calories} kcal, ${x.totals.protein} g protein, ${x.totals.carbs} g carbs, ${x.totals.fat} g fat, ${x.totals.fiber} g fiber.`];if(x.totals.average_satiety_score!==null)a.push(`Average Hava-style satiety score: ${x.totals.average_satiety_score}/100 (${cat(x.totals.average_satiety_score)}).`);if(x.targets&&x.remaining){a.push(`Targets: ${x.targets.calorie_target_min}-${x.targets.calorie_target_max} kcal and ${x.targets.protein_target_min}-${x.targets.protein_target_max} g protein.`);a.push(`Remaining estimate: ${x.remaining.calories_to_min}-${x.remaining.calories_to_max} kcal to target range; ${x.remaining.protein_to_min}-${x.remaining.protein_to_max} g protein to target range.`)}else a.push('No complete profile saved, so target fit is general only.');return a.join('\n')}
window.ai_edge_gallery_get_result=async function(dataStr){try{let input=JSON.parse(dataStr),s=get(),a=input.action;if(a==='set_profile'){s.profile={age:input.age?Number(input.age):null,sex:input.sex||'unknown',height_in:input.height_in?Number(input.height_in):null,weight_lb:input.weight_lb?Number(input.weight_lb):null,target_weight_lb:input.target_weight_lb?Number(input.target_weight_lb):null,goal:input.goal||'vacation_damage_control',activity:input.activity||'light',training_days:input.training_days?Number(input.training_days):null,appetite:input.appetite||'',notes:input.notes||'',updated_at:new Date().toISOString()};put(s);return JSON.stringify({result:'Profile saved locally.\n\n'+fmtT(targets(s.profile))})}if(a==='get_profile'){return JSON.stringify({result:s.profile?'Current saved profile:\n'+JSON.stringify(s.profile,null,2)+'\n\nTargets:\n'+fmtT(targets(s.profile)):'No profile saved yet.'})}if(a==='log_meal'){let d=date(input.date),m={meal_id:'meal_'+Date.now(),date:d,meal_name:input.meal_name||'Meal',foods:input.foods||'',calories_min:Number(input.calories_min)||0,calories_max:Number(input.calories_max)||0,protein_min:Number(input.protein_min)||0,protein_max:Number(input.protein_max)||0,carbs_min:Number(input.carbs_min)||0,carbs_max:Number(input.carbs_max)||0,fat_min:Number(input.fat_min)||0,fat_max:Number(input.fat_max)||0,fiber_min:Number(input.fiber_min)||0,fiber_max:Number(input.fiber_max)||0,satiety_score:Number(input.satiety_score)||50,satiety_category:cat(Number(input.satiety_score)||50),glycemic:input.glycemic||'Moderate',confidence:input.confidence||'Moderate',best_upgrade:input.best_upgrade||'',notes:input.notes||'',timestamp:new Date().toISOString()};s.meals.push(m);put(s);let sm=sum(s,d);return JSON.stringify({result:`Meal logged locally.\nMeal ID: ${m.meal_id}\nSatiety: ${m.satiety_score}/100 (${m.satiety_category})\n\n`+fmtS(sm),meal:m,day_summary:sm})}if(a==='get_day_summary'){let sm=sum(s,date(input.date));return JSON.stringify({result:fmtS(sm),day_summary:sm})}if(a==='get_history'){let days=parseInt(input.days)||7,c=new Date();c.setDate(c.getDate()-days+1);let ci=iso(c),ms=s.meals.filter(m=>m.date>=ci).sort((x,y)=>(x.date+x.timestamp).localeCompare(y.date+y.timestamp));let out=`Meal history for the last ${days} days:\n`+(ms.length?ms.map(m=>`- ${m.date}: ${m.meal_name} | ${m.calories_min}-${m.calories_max} kcal | protein ${m.protein_min}-${m.protein_max} g | satiety ${m.satiety_score}/100 | glycemic ${m.glycemic} | id ${m.meal_id}`).join('\n'):'No meals logged.');let res={result:out,meals:ms};if(input.show_dashboard)res.webview={url:`dashboard.html?days=${days}`,aspectRatio:.75};return JSON.stringify(res)}if(a==='delete_meal'){let before=s.meals.length;s.meals=s.meals.filter(m=>m.meal_id!==input.meal_id);put(s);return JSON.stringify({result:before===s.meals.length?`No meal found with id ${input.meal_id}.`:`Deleted meal ${input.meal_id}.`})}if(a==='export_data')return JSON.stringify({result:'Copy and save this JSON backup:\n\n'+JSON.stringify(s,null,2)});if(a==='wipe_data'){localStorage.removeItem(K);return JSON.stringify({result:'All cruise food analyzer profile and meal data has been deleted from local storage.'})}throw new Error('Unknown action: '+a)}catch(e){return JSON.stringify({error:'Cruise Food Analyzer error: '+e.message})}};
</script></body></html>
