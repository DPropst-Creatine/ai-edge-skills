<!doctype html><html><head><meta charset="utf-8"><title>SPC Food Lookup</title></head><body><script src="food-database.js"></script><script>
function norm(s){return String(s||'').toLowerCase().replace(/[^a-z0-9 ]+/g,' ').replace(/\s+/g,' ').trim()}
function tokens(s){return norm(s).split(' ').filter(Boolean)}
function splitItems(q){return String(q||'').split(/,|\+| and | with /i).map(x=>x.trim()).filter(Boolean)}
function scoreMatch(q,item){let qn=norm(q),names=[item.name].concat(item.aliases||[]).map(norm),best=0;for(const n of names){if(!qn||!n)continue;if(qn===n)best=Math.max(best,100);if(qn.includes(n)||n.includes(qn))best=Math.max(best,90);let qt=tokens(qn),nt=tokens(n),over=qt.filter(t=>nt.includes(t)).length;best=Math.max(best,Math.round(100*over/Math.max(qt.length,nt.length,1)))}return best}
function cat(x){x=+x||0;return x<30?'Low':x<50?'Lower-moderate':x<70?'Good':'Very high'}
function glyRank(g){return g==='High'?3:g==='Moderate'?2:1}
function glyFromItems(items){let r=Math.max(...items.map(i=>glyRank(i.glycemic)));return r>=3?'High':r===2?'Moderate':'Low'}
function search(q,limit=8){return (window.SPC_FOOD_DB||[]).map(item=>({...item,match_score:scoreMatch(q,item)})).filter(x=>x.match_score>0).sort((a,b)=>b.match_score-a.match_score||b.spc-a.spc).slice(0,limit)}
function bestItem(q){let r=search(q,1)[0];return r&&r.match_score>=35?r:null}
function weightedSPC(items){let cal=items.reduce((a,i)=>a+(+i.calories||0),0);if(!cal)return Math.round(items.reduce((a,i)=>a+(+i.spc||0),0)/Math.max(items.length,1));return Math.round(items.reduce((a,i)=>a+(+i.spc||0)*(+i.calories||0),0)/cal)}
function combine(items,name,type){let m={name:name||items.map(i=>i.name).join(' + '),meal_type:type||items[0]?.meal_type||'Lunch',calories:0,protein:0,carbs:0,fat:0,fiber:0,spc:0,glycemic:'Moderate',notes:''};for(const i of items){m.calories+=+i.calories||0;m.protein+=+i.protein||0;m.carbs+=+i.carbs||0;m.fat+=+i.fat||0;m.fiber+=+i.fiber||0}m.spc=weightedSPC(items);m.glycemic=glyFromItems(items);m.notes=items.map(i=>i.notes).filter(Boolean).join(' ');return m}
function scoreCustom(x){let cal=+x.calories||0,p=+x.protein||0,c=+x.carbs||0,fat=+x.fat||0,fi=+x.fiber||0;if(cal>2500&&p+c+fat>0)cal=Math.round(p*4+c*4+fat*9);let score=40;if(cal>0){score+=Math.min(30,(p*4/cal)*70);score+=Math.min(20,fi*2);if(cal<=400)score+=8;else if(cal>=900)score-=10;if(fat>35&&c>45)score-=12;if(String(x.glycemic||'').toLowerCase()==='high')score-=8;if(String(x.glycemic||'').toLowerCase()==='low')score+=5}score=Math.max(0,Math.min(100,Math.round(score/5)*5));return{name:x.meal_name||'Custom meal',meal_type:x.meal_type||'Lunch',calories:Math.round(cal),protein:Math.round(p),carbs:Math.round(c),fat:Math.round(fat),fiber:Math.round(fi),spc:score,glycemic:x.glycemic||'Moderate',notes:x.notes||'Custom macro estimate.'}}
function pasteBlock(m){return `Meal: ${m.name}\nMeal Type: ${m.meal_type}\nCalories: ${Math.round(m.calories)}\nProtein: ${Math.round(m.protein)}\nCarbs: ${Math.round(m.carbs)}\nFat: ${Math.round(m.fat)}\nFiber: ${Math.round(m.fiber)}\nSPC: ${Math.round(m.spc)}\nGlycemic: ${m.glycemic}\nNotes: ${m.notes||''}`}
function brief(m){return `${m.name}: ${Math.round(m.calories)} kcal, ${Math.round(m.protein)} g protein, ${Math.round(m.carbs)} g carbs, ${Math.round(m.fat)} g fat, ${Math.round(m.fiber)} g fiber, SPC ${Math.round(m.spc)}/100 (${cat(m.spc)}), glycemic ${m.glycemic}.`}
function mealFromQuery(input){let parts=Array.isArray(input.items)?input.items:splitItems(input.query||input.meal||'');let matched=[];let missed=[];for(const p of parts){let item=bestItem(p);if(item)matched.push(item);else missed.push(p)}if(!matched.length)return{error:'No database matches found.',missed};let meal=combine(matched,input.meal_name,input.meal_type);if(missed.length)meal.notes+=' Rough database meal; unmatched item(s): '+missed.join(', ')+'.';return{meal,matched,missed}}
function formatMealResult(meal,matched,missed){let note=missed&&missed.length?`\nUnmatched: ${missed.join(', ')}.`:'';return `Best match or meal: ${meal.name}\nWhy it fits: Database-based estimate from ${matched.length} matched item(s).${note}\n\nPaste Into Tracker:\n${pasteBlock(meal)}\n\nNotes:\n- ${meal.notes||'Database estimate.'}`}
window.ai_edge_gallery_get_result=async function(dataStr){try{let input=JSON.parse(dataStr||'{}'),action=input.action||'meal';if(action==='search'){let results=search(input.query||'',input.limit||8);return JSON.stringify({result:results.length?results.map((r,i)=>`${i+1}. ${brief(r)} Match ${r.match_score}.`).join('\n'):'No database match found.',results})}if(action==='meal'||action==='build_meal'){let out=mealFromQuery(input);if(out.error)return JSON.stringify({result:out.error,missed:out.missed||[]});return JSON.stringify({result:formatMealResult(out.meal,out.matched,out.missed),meal:out.meal,matched:out.matched,missed:out.missed,paste_block:pasteBlock(out.meal)})}if(action==='score_custom'){let meal=scoreCustom(input);return JSON.stringify({result:`Best match or meal: ${meal.name}\nWhy it fits: Custom macro-based SPC estimate.\n\nPaste Into Tracker:\n${pasteBlock(meal)}\n\nNotes:\n- ${meal.notes}`,meal,paste_block:pasteBlock(meal)})}return JSON.stringify({result:'Unknown action: '+action})}catch(e){return JSON.stringify({result:'SPC Food Lookup error: '+e.message})}}
</script></body></html>
